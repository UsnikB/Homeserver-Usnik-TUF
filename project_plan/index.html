<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Project Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --secondary-text: #b0b0b0;
            --border-color: #333;
            --success-color: #03dac6;
            --danger-color: #cf6679;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .view-container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        #home-view, #detail-view {
            display: none;
        }

        #home-view.active, #detail-view.active {
            display: block;
        }

        /* Home View Grid */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .project-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: var(--accent-color);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .badge-not-started { background-color: #444; color: #fff; }
        .badge-in-progress { background-color: var(--accent-color); color: #000; }
        .badge-done { background-color: var(--success-color); color: #000; }

        .project-title { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
        .project-month { color: var(--accent-color); font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
        .project-summary { font-size: 0.95rem; color: var(--secondary-text); margin-bottom: 20px; line-height: 1.4; }

        .progress-container {
            background-color: #333;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text { font-size: 0.85rem; color: var(--secondary-text); text-align: right; }

        /* Detail View */
        .back-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover { background-color: #252525; }

        .detail-header { margin-bottom: 30px; }
        .detail-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .detail-grid { grid-template-columns: 1fr; }
        }

        .content-block {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .block-title {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            padding: 12px;
            background: #252525;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .task-item:hover { background: #2a2a2a; }
        .task-item input { margin-top: 4px; margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        .task-text { flex-grow: 1; }
        .task-title { display: block; font-weight: bold; margin-bottom: 4px; }
        .task-desc { display: block; font-size: 0.9rem; color: var(--secondary-text); line-height: 1.5; }
        .task-item.completed { opacity: 0.7; }
        .task-item.completed .task-title { text-decoration: line-through; }

        .tech-tag {
            display: inline-block;
            background: #333;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        /* Chat Panel */
        #chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            font-size: 1.5rem;
        }

        #chat-panel {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100%;
            background-color: #1a1a1a;
            border-left: 1px solid var(--border-color);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            z-index: 1001;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        #chat-panel.open { right: 0; }
        #chat-panel.fullscreen {
            width: 100%;
            right: 0;
            border-left: none;
        }

        .chat-header {
            padding: 20px;
            background-color: #252525;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message-assistant {
            background-color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message-user {
            background-color: var(--accent-color);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            background-color: #252525;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex-grow: 1;
            background-color: #121212;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 15px;
            outline: none;
        }

        #send-btn {
            background-color: var(--accent-color);
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Settings */
        .settings-panel {
            padding: 15px;
            background-color: #222;
            border-bottom: 1px solid var(--border-color);
            display: none;
        }

        .settings-panel.open { display: block; }

        .setting-group { margin-bottom: 10px; }
        .setting-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: var(--secondary-text); }
        .setting-group select, .setting-group input {
            width: 100%;
            background-color: #121212;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .close-btn { cursor: pointer; font-size: 1.2rem; }

        @media (max-width: 600px) {
            #chat-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GenAI Project Roadmap</h1>
        <p>Mastering LangGraph & Multi-Agent Systems over 3 months</p>
    </header>

    <div class="view-container">
        <div id="home-view" class="active">
            <div class="container" id="home-grid">
                <!-- Project cards injected here -->
            </div>
        </div>

        <div id="detail-view">
            <button class="back-btn" onclick="showHome()">← Back to Roadmap</button>
            <div id="detail-content">
                <!-- Project details injected here -->
            </div>
        </div>
    </div>

    <div id="chat-trigger" title="Chat with Mentor">🤖</div>

    <div id="chat-panel">
        <div class="chat-header">
            <span>GenAI Mentor</span>
            <div class="chat-header-actions">
                <span id="fullscreen-trigger" style="cursor: pointer; font-size: 1.1rem;" title="Toggle Fullscreen">⛶</span>
                <span id="settings-trigger" style="cursor: pointer; font-size: 1.2rem;">⚙️</span>
                <span class="close-btn" id="close-chat">&times;</span>
            </div>
        </div>
        
        <div class="settings-panel" id="settings-panel">
            <div class="setting-group">
                <label>Provider</label>
                <select id="provider-select">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="gemini">Google (Gemini)</option>
                    <option value="ollama">Local (Ollama)</option>
                </select>
            </div>
            <div class="setting-group" id="api-key-group">
                <label>API Key</label>
                <input type="password" id="api-key-input" placeholder="Enter your key...">
            </div>
            <div class="setting-group" id="model-group">
                <label>Model Name</label>
                <input type="text" id="model-name-input" placeholder="e.g. claude-3-5-sonnet-20241022">
            </div>
            <div class="setting-group" id="ollama-url-group" style="display:none">
                <label>Ollama URL</label>
                <input type="text" id="ollama-url-input" value="http://192.168.0.4:11434">
            </div>
            <button id="save-settings" style="width:100%; padding: 8px; background: var(--success-color); border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Save Settings</button>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Ask your mentor...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & INITIALIZATION ---
        const DEFAULT_PROJECTS = [
            {
                id: 1,
                title: "AI Research Assistant",
                month: "Month 1",
                goal: "Single agent with tools + RAG inside an agent",
                pattern: "Single agent with tools (ReAct loop)",
                stack: ["LangGraph", "LangChain", "Chroma/FAISS", "LangSmith", "Tavily"],
                status: "Not Started",
                summary: "Build a robust research agent capable of navigating external search and internal documents to answer complex queries.",
                tasks: [
                    { id: 101, title: "Env & Tracing Setup", desc: "Initialize your repository, configure LangSmith for full trace visibility, and set up a local vector DB (Chroma/FAISS) with OpenAI/HuggingFace embeddings.", completed: false },
                    { id: 102, title: "Tooling & RAG Core", desc: "Build a custom search tool using Tavily or DuckDuckGo API and implement the document ingestion pipeline for the RAG component using LangChain loaders.", completed: false },
                    { id: 103, title: "LangGraph ReAct Loop", desc: "Design the graph state and implement the standard ReAct (Reason-Action) cycle with conditional edges that determine when to call tools vs when to respond.", completed: false },
                    { id: 104, title: "Integration & Optimization", desc: "Connect the RAG tool to the agent, fine-tune the system prompt for research accuracy, and perform benchmark tests to ensure valid citations.", completed: false }
                ],
            },
            {
                id: 2,
                title: "Document Intelligence Platform",
                month: "Month 2",
                goal: "Supervisor pattern + specialist agents + multi-tenant RAG",
                pattern: "Supervisor / orchestrator with specialists",
                stack: ["LangGraph", "LlamaIndex", "Unstructured.io", "FastAPI", "PostgreSQL"],
                status: "Not Started",
                summary: "A multi-agent system where a supervisor routes complex document tasks to specialized agents (Parser, Analyst, Summarizer).",
                tasks: [
                    { id: 201, title: "Specialist Agent Design", desc: "Define unique system prompts and toolsets for a 'Parsing Specialist' (PDF/OCR), an 'Analysis Specialist' (Logic), and a 'Summary Specialist'.", completed: false },
                    { id: 202, title: "Supervisor Orchestration", desc: "Implement the central Supervisor node that interprets user intent and routes tasks to the appropriate specialist using LangGraph's router pattern.", completed: false },
                    { id: 203, title: "Multi-Tenant RAG", desc: "Enhance the vector store to support metadata filtering for different users/teams and integrate Unstructured.io for handling messy PDF layouts.", completed: false },
                    { id: 204, title: "API & State Management", desc: "Wrap the multi-agent graph in a FastAPI backend and ensure state persistence across turns in a multi-tenant context using checkpointers.", completed: false }
                ],
            },
            {
                id: 3,
                title: "Automated Business Report Analyst",
                month: "Month 3",
                goal: "Parallel agents + human-in-the-loop + evals + observability",
                pattern: "Parallel fan-out + human-in-the-loop",
                stack: ["LangGraph", "Pandas", "RAGAS", "LangSmith", "Streamlit"],
                status: "Not Started",
                summary: "A high-end analytical tool that uses parallel processing for data streams and requires human verification for final business reports.",
                tasks: [
                    { id: 301, title: "Parallel Fan-out Pattern", desc: "Implement parallel nodes in LangGraph to process multiple data streams (e.g., market trends vs. financial data) simultaneously before merging results.", completed: false },
                    { id: 302, title: "Human-in-the-Loop", desc: "Add an interrupt/breakpoint in the graph that waits for human feedback/approval before proceeding to the final report generation phase.", completed: false },
                    { id: 303, title: "Evaluation & Observability", desc: "Set up RAGAS for automated evaluation of retrieval quality and implement custom LangSmith evaluators for the agentic output.", completed: false },
                    { id: 304, title: "UI & Final Polish", desc: "Build a Streamlit dashboard to visualize the report generation process in real-time, including agent logs, and finalize the prototype.", completed: false }
                ],
            }
        ];

        let state = JSON.parse(localStorage.getItem('genai_tracker_state')) || {
            projects: DEFAULT_PROJECTS,
            chatHistory: [
                { role: 'assistant', content: "Hey! I know your full plan — 3 projects over 3 months to master LangGraph and multi-agent design. You're starting with the AI Research Assistant. What do you want to tackle first?" }
            ],
            settings: {
                provider: 'ollama',
                apiKey: '',
                modelName: 'qwen3.5:9b',
                ollamaUrl: 'http://192.168.0.4:11434'
            },
            currentProjectId: null
        };

        // --- STATE MIGRATION / SYNC ---
        // If the user has old state without 'summary', force update projects from DEFAULT_PROJECTS
        if (state.projects && state.projects.length > 0 && !state.projects[0].summary) {
            console.log("Migrating state to new structure...");
            state.projects = DEFAULT_PROJECTS;
            saveState();
        }

        const SYSTEM_PROMPT = "You are a senior GenAI engineering mentor. The user is building these 3 projects (AI Research Assistant, Document Intelligence Platform, Automated Business Report Analyst) to learn LangGraph and multi-agent systems. Help them with architecture decisions, code, debugging, and learning guidance.";

        // --- UI ELEMENTS ---
        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const homeGrid = document.getElementById('home-grid');
        const detailContent = document.getElementById('detail-content');
        const chatPanel = document.getElementById('chat-panel');
        const chatTrigger = document.getElementById('chat-trigger');
        const closeChat = document.getElementById('close-chat');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const settingsTrigger = document.getElementById('settings-trigger');
        const settingsPanel = document.getElementById('settings-panel');
        const providerSelect = document.getElementById('provider-select');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelNameInput = document.getElementById('model-name-input');
        const ollamaUrlInput = document.getElementById('ollama-url-input');
        const saveSettingsBtn = document.getElementById('save-settings');

        // --- NAVIGATION & RENDERING ---
        function saveState() {
            localStorage.setItem('genai_tracker_state', JSON.stringify(state));
        }

        function showHome() {
            state.currentProjectId = null;
            saveState();
            homeView.classList.add('active');
            detailView.classList.remove('active');
            renderHome();
        }

        function showDetail(projectId) {
            state.currentProjectId = projectId;
            saveState();
            homeView.classList.remove('active');
            detailView.classList.add('active');
            renderDetail();
        }

        function renderHome() {
            homeGrid.innerHTML = '';
            state.projects.forEach(project => {
                const completedCount = project.tasks.filter(t => t.completed).length;
                const progress = Math.round((completedCount / project.tasks.length) * 100);
                
                let badgeClass = 'badge-not-started';
                if (progress === 100) badgeClass = 'badge-done';
                else if (progress > 0) badgeClass = 'badge-in-progress';

                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => showDetail(project.id);
                card.innerHTML = `
                    <div class="badge ${badgeClass}">${progress === 100 ? 'Done' : (progress > 0 ? 'In Progress' : 'Not Started')}</div>
                    <div class="project-title">${project.title}</div>
                    <div class="project-month">${project.month}</div>
                    <div class="project-summary">${project.summary || ''}</div>
                    
                    <div style="margin-top: auto;">
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                        <div class="progress-text">${progress}% Complete</div>
                    </div>
                `;
                homeGrid.appendChild(card);
            });
        }

        function renderDetail() {
            const project = state.projects.find(p => p.id === state.currentProjectId);
            if (!project) {
                showHome();
                return;
            }

            const completedCount = project.tasks.filter(t => t.completed).length;
            const progress = Math.round((completedCount / project.tasks.length) * 100);

            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="badge ${progress === 100 ? 'badge-done' : (progress > 0 ? 'badge-in-progress' : 'badge-not-started')}">
                        ${project.month} • ${project.status}
                    </div>
                    <h1 style="margin: 10px 0; color: #fff;">${project.title}</h1>
                    <p style="color: var(--secondary-text); font-size: 1.1rem;">${project.goal}</p>
                </div>

                <div class="detail-grid">
                    <div class="main-col">
                        <div class="content-block">
                            <div class="block-title">Project Roadmap (Week-by-Week)</div>
                            <ul class="task-list">
                                ${project.tasks.map(task => `
                                    <li class="task-item ${task.completed ? 'completed' : ''}">
                                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${project.id}, ${task.id})">
                                        <div class="task-text">
                                            <span class="task-title">${task.title || 'Task'}</span>
                                            <span class="task-desc">${task.desc || ''}</span>
                                        </div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="side-col">
                        <div class="content-block">
                            <div class="block-title">Progress</div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-text" style="font-size: 1.2rem; font-weight: bold; color: var(--success-color);">${progress}% Complete</div>
                        </div>

                        <div class="content-block">
                            <div class="block-title">Pattern & Stack</div>
                            <p><strong>Pattern:</strong><br>${project.pattern}</p>
                            <div style="margin-top: 15px;">
                                ${project.stack.map(s => `<span class="tech-tag">${s}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.toggleTask = (projectId, taskId) => {
            const project = state.projects.find(p => p.id === projectId);
            const task = project.tasks.find(t => t.id === taskId);
            task.completed = !task.completed;
            
            const completedCount = project.tasks.filter(t => t.completed).length;
            if (completedCount === 0) project.status = "Not Started";
            else if (completedCount === project.tasks.length) project.status = "Done";
            else project.status = "In Progress";

            saveState();
            renderDetail();
            renderHome();
        };

        function renderChat() {
            chatMessages.innerHTML = '';
            state.chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message message-${msg.role}`;
                div.textContent = msg.content;
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- AI API INTEGRATIONS ---
        async function callAI(message, onChunk) {
            const { provider, apiKey, modelName, ollamaUrl } = state.settings;
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT },
                ...state.chatHistory.map(m => ({ role: m.role, content: m.content })),
                { role: 'user', content: message }
            ];

            try {
                if (provider === 'anthropic') {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: modelName || 'claude-3-5-sonnet-20241022',
                            max_tokens: 1024,
                            system: SYSTEM_PROMPT,
                            messages: messages.filter(m => m.role !== 'system')
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    return data.content[0].text;

                } else if (provider === 'openai') {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: modelName || 'gpt-4o',
                            messages: messages
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    return data.choices[0].message.content;

                } else if (provider === 'gemini') {
                    const geminiMessages = messages.map(m => ({
                        role: m.role === 'assistant' ? 'model' : 'user',
                        parts: [{ text: m.content }]
                    }));
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName || 'gemini-1.5-pro'}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: geminiMessages })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    return data.candidates[0].content.parts[0].text;

                } else if (provider === 'ollama') {
                    const response = await fetch(`${ollamaUrl}/api/chat`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: modelName || 'qwen3.5:9b',
                            messages: messages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Ollama responded with status ${response.status}.`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const json = JSON.parse(line);
                                if (json.message && json.message.content) {
                                    fullContent += json.message.content;
                                    if (onChunk) onChunk(fullContent);
                                }
                                if (json.done) break;
                            } catch (e) {
                                console.warn('Failed to parse JSON chunk', line);
                            }
                        }
                    }
                    return fullContent;
                }
            } catch (err) {
                console.error(err);
                if (provider === 'ollama') {
                    return `Error: ${err.message}. This is likely a CORS issue. Please ensure Ollama is running with OLLAMA_ORIGINS="*" and that the URL ${ollamaUrl} is reachable.`;
                }
                return `Error: ${err.message}. Please check your API settings.`;
            }
        }

        // --- EVENT LISTENERS ---
        chatTrigger.addEventListener('click', () => chatPanel.classList.toggle('open'));
        closeChat.addEventListener('click', () => {
            chatPanel.classList.remove('open');
            chatPanel.classList.remove('fullscreen');
        });

        document.getElementById('fullscreen-trigger').addEventListener('click', () => {
            chatPanel.classList.toggle('fullscreen');
        });
        
        settingsTrigger.addEventListener('click', () => {
            settingsPanel.classList.toggle('open');
            apiKeyInput.value = state.settings.apiKey;
            modelNameInput.value = state.settings.modelName;
            ollamaUrlInput.value = state.settings.ollamaUrl;
            providerSelect.value = state.settings.provider;
            toggleProviderFields();
        });

        function toggleProviderFields() {
            const p = providerSelect.value;
            document.getElementById('api-key-group').style.display = p === 'ollama' ? 'none' : 'block';
            document.getElementById('ollama-url-group').style.display = p === 'ollama' ? 'block' : 'none';
        }

        providerSelect.addEventListener('change', toggleProviderFields);

        saveSettingsBtn.addEventListener('click', () => {
            state.settings = {
                provider: providerSelect.value,
                apiKey: apiKeyInput.value,
                modelName: modelNameInput.value,
                ollamaUrl: ollamaUrlInput.value
            };
            saveState();
            settingsPanel.classList.remove('open');
            alert('Settings saved!');
        });

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            state.chatHistory.push({ role: 'user', content: text });
            chatInput.value = '';
            renderChat();

            const assistantMsgDiv = document.createElement('div');
            assistantMsgDiv.className = 'message message-assistant';
            assistantMsgDiv.textContent = '...';
            chatMessages.appendChild(assistantMsgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const response = await callAI(text, (currentText) => {
                assistantMsgDiv.textContent = currentText;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
            
            state.chatHistory.push({ role: 'assistant', content: response });
            saveState();
            renderChat();
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // --- INIT ---
        if (state.currentProjectId) {
            showDetail(state.currentProjectId);
        } else {
            showHome();
        }
        renderChat();
    </script>
</body>
</html>
